<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arventis | Agri-Industrial Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="scroll-container">
        
        <section class="panel">
            <div class="bg-image bg-1" style="background-image: url('header.png');"></div>
            <div class="bg-overlay"></div>
            <div class="content">
                <header class="gsap-reveal">
                    <div class="logo">
                        <img src="logo.png" alt="Arventis Logo">
                        </div>
                </header>
            </div>
        </section>

        <section class="panel">
            <div class="bg-image bg-2" style="background-image: url('hero.png');"></div>
            <div class="bg-overlay"></div>
            <div class="content">
                <div class="hero-content gsap-reveal">
                    <h1 class="hero-title">AGRI-INDUSTRIAL PLATFORM<br>OF THE FUTURE</h1>
                    <p class="hero-subtitle">Expertly managed industrial park focusing on<br>agri-processing, logistics, and innovation</p>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="bg-image bg-3" style="background-image: url('footer.png');"></div>
            <div class="bg-overlay"></div>
            <div class="content">
                <footer class="gsap-reveal">
                    <div class="status-block">
                        <h2 class="status-title">WEBSITE UNDER DEVELOPMENT</h2>
                        <p class="status-text">Stay tuned for updates</p>
                    </div>
                    <a href="mailto:project@arventisip.com" class="email-link">project@arventisip.com</a>
                </footer>
            </div>
        </section>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
